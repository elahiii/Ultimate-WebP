<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Ultimate WebP Compressor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header>
      <div class="brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Ultimate WebP</h1>
          <p>Maximum compression · Lossless quality</p>
        </div>
      </div>
      <div class="badge">WebP</div>
    </header>

    <div class="drop-zone" id="dropZone">
      <div class="dz-glow"></div>
      <div class="dz-inner">
        <div class="dz-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="dz-title">Drop images here</p>
        <p class="dz-sub">or <button class="link-btn" id="selectBtn">browse files</button></p>
        <p class="dz-formats">PNG · JPG · GIF · BMP · TIFF · SVG</p>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" hidden>
    </div>

    <section id="workArea" hidden>

      <div class="stats-bar" id="statsBar" hidden>
        <div class="stat-block">
          <span class="stat-val" id="statFiles">—</span>
          <span class="stat-lbl">files</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <span class="stat-val green" id="statSaved">—</span>
          <span class="stat-lbl">saved</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <span class="stat-val green" id="statAvg">—</span>
          <span class="stat-lbl">avg reduction</span>
        </div>
      </div>

      <ul class="file-list" id="fileList"></ul>

      <div class="bottom-bar">
        <button id="convertBtn" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span id="btnLabel">Compress &amp; Download All</span>
        </button>
        <button id="clearBtn" class="btn-ghost">Clear</button>
      </div>

    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
